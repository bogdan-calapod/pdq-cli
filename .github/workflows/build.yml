name: Build Executables

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

  build:
    name: Build (${{ matrix.target }})
    needs: lint
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
            pkg_target: node22-linux-x64
            artifact_name: pdq-linux-x64

          - target: linux-arm64
            runner: ubuntu-latest
            pkg_target: node22-linux-arm64
            artifact_name: pdq-linux-arm64

          - target: macos-arm64
            runner: macos-latest
            pkg_target: node22-macos-arm64
            artifact_name: pdq-macos-arm64

          - target: macos-x64
            runner: macos-latest
            pkg_target: node22-macos-x64
            artifact_name: pdq-macos-x64

          - target: windows-x64
            runner: windows-latest
            pkg_target: node22-win-x64
            artifact_name: pdq-windows-x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run build

      - name: Build executable (Linux / macOS)
        if: "!startsWith(matrix.target, 'windows')"
        run: |
          npx pkg dist/index.js \
            --target ${{ matrix.pkg_target }} \
            --output dist/${{ matrix.artifact_name }}

      - name: Build executable (Windows)
        if: startsWith(matrix.target, 'windows')
        run: |
          npx pkg dist/index.js `
            --target ${{ matrix.pkg_target }} `
            --output dist/${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    outputs:
      release_url: ${{ steps.create_release.outputs.url }}

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Display structure
        run: ls -R artifacts/

      - name: Create release and upload binaries
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/pdq-linux-x64/pdq-linux-x64
            artifacts/pdq-linux-arm64/pdq-linux-arm64
            artifacts/pdq-macos-arm64/pdq-macos-arm64
            artifacts/pdq-macos-x64/pdq-macos-x64
            artifacts/pdq-windows-x64.exe/pdq-windows-x64.exe
          generate_release_notes: true

  update-homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download binaries and calculate SHA256s
        id: sha256
        run: |
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}"
          for binary in pdq-macos-arm64 pdq-macos-x64 pdq-linux-arm64 pdq-linux-x64; do
            curl -sL "$BASE_URL/$binary" -o "$binary"
            SHA=$(sha256sum "$binary" | cut -d ' ' -f 1)
            echo "${binary//-/_}_sha256=$SHA" >> $GITHUB_OUTPUT
          done

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: bogdan-calapod/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          cat > homebrew-tap/Formula/pdq-cli.rb << 'FORMULA'
          class PdqCli < Formula
            desc "CLI for PDQ Connect and PDQ Detect"
            homepage "https://github.com/bogdan-calapod/pdq-cli"
            version "${{ steps.version.outputs.version }}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/bogdan-calapod/pdq-cli/releases/download/${{ steps.version.outputs.tag }}/pdq-macos-arm64"
                sha256 "${{ steps.sha256.outputs.pdq_macos_arm64_sha256 }}"
              end
              on_intel do
                url "https://github.com/bogdan-calapod/pdq-cli/releases/download/${{ steps.version.outputs.tag }}/pdq-macos-x64"
                sha256 "${{ steps.sha256.outputs.pdq_macos_x64_sha256 }}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/bogdan-calapod/pdq-cli/releases/download/${{ steps.version.outputs.tag }}/pdq-linux-arm64"
                sha256 "${{ steps.sha256.outputs.pdq_linux_arm64_sha256 }}"
              end
              on_intel do
                url "https://github.com/bogdan-calapod/pdq-cli/releases/download/${{ steps.version.outputs.tag }}/pdq-linux-x64"
                sha256 "${{ steps.sha256.outputs.pdq_linux_x64_sha256 }}"
              end
            end

            def install
              binary_name = "pdq-macos-arm64" if OS.mac? && Hardware::CPU.arm?
              binary_name = "pdq-macos-x64" if OS.mac? && Hardware::CPU.intel?
              binary_name = "pdq-linux-arm64" if OS.linux? && Hardware::CPU.arm?
              binary_name = "pdq-linux-x64" if OS.linux? && Hardware::CPU.intel?

              bin.install binary_name => "pdq"
            end

            test do
              assert_match "pdq-cli", shell_output("#{bin}/pdq --version")
            end
          end
          FORMULA

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/pdq-cli.rb
          git commit -m "pdq-cli: update to ${{ steps.version.outputs.version }}"
          git push

